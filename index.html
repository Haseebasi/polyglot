<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <section class="header-contents">
            <img src="assets/parrot.png" class="logo-img" alt="cartoon parrot in midflight logo">
            <div class="header-text">
                <h1 class ="app-title">PollyGlot</h1>
                <p class="header-description">Perfect Translation Every Time</p>
            </div>
            </section>
        </header>
        <main>
            <form class="input-form" id="input-form">

                <label for="user-input"><h2 class="form-head">Text to translate 👇</h2></label>
                <textarea type="text" id="user-input"></textarea>

                <h2 class="form-head">select language 👇</h2>

                <section class="radio-grp">
                    
                <div class="radio-btn"><input type="radio" name="choose-language" value="French" id="french">
                <label for="french" >French <img src="assets\fr-flag.png" class="radio-label-img"></label></div>
                <div class="radio-btn"><input type="radio" name="choose-language" value="Spanish" id="spanish">
                <label for="spanish">Spanish <img src="assets\sp-flag.png" class="radio-label-img"></label></div>
                <div class="radio-btn"><input type="radio" name="choose-language" value="Japanese" id="japanese">
                <label for="japanese">Japanese <img src="assets\jpn-flag.png" class="radio-label-img"></label></div>
                </section>
                
                <button class="form-btn" type="submit">Translate</button>

            </form>
            <form class="output-form hide" id="output-form">
                 <label for="user-input"><h2 class="form-head">Original Text 👇</h2></label>
                <textarea type="text" id="user-input" class="user-input" readonly></textarea>

                <h2 class="form-head">Your translation 👇</h2>
                <textarea type="text" id="ai-output" class="user-input" readonly></textarea>
                <section class="radio-grp"></section>
                <button class="form-btn" type="submit">Start over</button>
            </form>
        </main>
        <!-- Your HTML here -->
        <script src="index.js" type="module"></script>
    </body>
</html>
